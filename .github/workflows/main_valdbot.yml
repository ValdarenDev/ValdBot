name: Deploy ValdBot to Container Apps

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AZURE_CONTAINERAPP_NAME: vald-bot
      AZURE_RESOURCE_GROUP: valdbot-rg
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Docker login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login $ACR_LOGIN_SERVER \
            --username "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $ACR_LOGIN_SERVER/valdbot:latest .

      - name: Push Docker image
        run: |
          docker push $ACR_LOGIN_SERVER/valdbot:latest

      - name: Create or update Container App
        run: |
          az containerapp up \
            --name $AZURE_CONTAINERAPP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/valdbot:latest \
            --ingress none \
            --location "Central US"
